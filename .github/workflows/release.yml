name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.3.1
        required: true
        default: v0.3.1
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - app-manifest.json
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($tag) -and "${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $manifest = Get-Content -Raw app-manifest.json | ConvertFrom-Json
            $tag = "v$($manifest.version)"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "v0.3.1"
          }
          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }
          $version = $tag.Substring(1)
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build Windows desktop ZIP
        shell: pwsh
        run: ./tools/package-desktop.ps1 -Version $env:RELEASE_VERSION -OutputDir dist

      - name: Build Android APK
        run: gradle -p android --no-daemon :app:assembleDebug -PVERSION_NAME="$RELEASE_VERSION"

      - name: Collect Android APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk dist/CodexControlConsole-android.apk

      - name: Create SHA-256 checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem dist -File | Where-Object { $_.Extension -in ".zip", ".apk" }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)" | Set-Content -LiteralPath "$($file.FullName).sha256" -Encoding utf8
          }

          $assets = foreach ($file in $files) {
            [ordered]@{
              name = $file.Name
              url = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/$($file.Name)"
              size = $file.Length
              sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            }
          }
          $manifest = [ordered]@{
            version = $env:RELEASE_VERSION
            tag = $env:RELEASE_TAG
            releaseUrl = "https://github.com/${{ github.repository }}/releases/tag/$env:RELEASE_TAG"
            publishedAt = (Get-Date).ToUniversalTime().ToString("o")
            assets = @($assets)
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath dist/update-manifest.json -Encoding utf8

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Codex Console ${{ env.RELEASE_TAG }}
          files: |
            dist/CodexControlConsole-windows.zip
            dist/CodexControlConsole-developer-windows.zip
            dist/CodexControlConsole-lite-windows.zip
            dist/CodexControlConsole-android.apk
            dist/*.sha256
            dist/update-manifest.json
          body: |
            ## Start Here

            Most people should download **CodexControlConsole-lite-windows.zip** for Codex Console.

            | Need | Download |
            | --- | --- |
            | Wallpaper + Music only | CodexControlConsole-lite-windows.zip |
            | Full developer tools | CodexControlConsole-developer-windows.zip |
            | Android companion | CodexControlConsole-android.apk |

            ## Windows

            1. Download a ZIP.
            2. Unzip it anywhere.
            3. Double-click `Start-ControlConsole.vbs`.

            For Android, run `Start-ControlConsole-LAN.vbs` on the PC first, then open the APK and enter the PC LAN URL.

            Windows portable builds now check GitHub automatically. Updates are verified with the attached SHA-256 files before installation, and each Windows user keeps separate local data.

            The Developer build includes Blender > Helper > GitHub Coop. Shared repositories can appear before they are downloaded, then open the correct Clone or local repository flow in GitHub Desktop.
