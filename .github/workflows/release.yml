name: Release Windows x64 Setup

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.4.0
        required: true
        default: v0.5.6
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ github.ref_name }}" }
          if (-not $tag.StartsWith("v")) { $tag = "v$tag" }
          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') { throw "Invalid release version: $version" }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Python x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install build dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check pyinstaller pillow yt-dlp

      - name: Test feedback and update services
        shell: pwsh
        run: |
          python tools/check-feedback.py
          python tools/check-console-update.py
          python tools/check-clean-uninstall.py
          node --test services/feedback-relay/test/feedback.test.js

      - name: Install Inno Setup 7 x64
        shell: pwsh
        run: |
          $download = Join-Path $env:RUNNER_TEMP "innosetup-7.0.2-x64.exe"
          $installDir = Join-Path $env:RUNNER_TEMP "Inno Setup 7"
          Invoke-WebRequest "https://github.com/jrsoftware/issrc/releases/download/is-7_0_2/innosetup-7.0.2-x64.exe" -OutFile $download
          $process = Start-Process -FilePath $download -ArgumentList "/CURRENTUSER", "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/DIR=`"$installDir`"" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Inno Setup installation failed: $($process.ExitCode)" }
          $compiler = Join-Path $installDir "ISCC.exe"
          if (-not (Test-Path -LiteralPath $compiler)) { throw "ISCC.exe was not installed" }
          "INNO_SETUP_COMPILER=$compiler" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows x64 Setup
        shell: pwsh
        run: |
          ./tools/build-windows.ps1 `
            -Version $env:RELEASE_VERSION `
            -OutputDir dist `
            -FeedbackEndpoint '${{ vars.CODEX_FEEDBACK_ENDPOINT }}' `
            -FeedbackTurnstileSiteKey '${{ vars.CODEX_FEEDBACK_TURNSTILE_SITE_KEY }}'

      - name: Verify packaged resources and shortcuts
        shell: pwsh
        run: python tools/check-package-resources.py

      - name: Sign Setup with Microsoft Artifact Signing
        if: ${{ vars.ARTIFACT_SIGNING_ENDPOINT != '' }}
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signed Setup
        if: ${{ vars.ARTIFACT_SIGNING_ENDPOINT != '' }}
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature "dist\CodexControlConsole-Setup-x64.exe"
          if ($signature.Status -ne "Valid") {
            throw "Setup signature is not valid: $($signature.Status)"
          }

      - name: Verify single download
        shell: pwsh
        run: |
          $files = @(Get-ChildItem dist -File)
          if ($files.Count -ne 1 -or $files[0].Name -ne "CodexControlConsole-Setup-x64.exe") {
            throw "Release must contain exactly one Windows x64 Setup file."
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Codex Console ${{ env.RELEASE_TAG }}
          make_latest: true
          files: dist/CodexControlConsole-Setup-x64.exe
          body: |
            ## Windows x64

            Download only **CodexControlConsole-Setup-x64.exe**.

            1. Double-click the downloaded Setup file.
            2. Choose **简体中文** or **English**.
            3. On the destination page, choose the drive and install folder.
            4. Finish Setup, then launch **Codex Console** from the desktop or Start menu.

            ## Windows 64 位

            只需下载 **CodexControlConsole-Setup-x64.exe**。

            1. 双击下载好的安装程序。
            2. 选择 **简体中文** 或 **English**。
            3. 在安装位置页面选择磁盘和目录。
            4. 完成安装后，从桌面或开始菜单启动 **Codex Console**。
