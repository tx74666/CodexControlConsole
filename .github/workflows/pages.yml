name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate download page source
        run: test -f docs/index.html

      - name: Print release download page
        run: |
          echo "Downloads: https://github.com/${{ github.repository }}/releases/latest"
